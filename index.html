<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALBION RADAR | V5.6 AUTO-CLEAN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f172a; color: #cbd5e1; margin: 0; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid #334155; }
        .priority-row { border-left: 4px solid #f59e0b; }
        .expired-row { opacity: 0.2; grayscale: 1; pointer-events: none; } /* Süresi bitenleri iyice karartır */
        .dev-banner { background-color: #0369a1; color: white; text-align: center; font-size: 0.75rem; padding: 0.25rem; font-weight: bold; }
    </style>
</head>
<body class="font-sans">

    <div class="dev-banner">🚀 V5.6: SÜRESİ BİTENLER OTOMATİK GİZLENİR</div>

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-amber-500 mb-2">⚔️ Albion Objective Tracker</h1>
            <p class="text-xs text-slate-500 uppercase tracking-widest font-bold">Auto-Cleaning Command Center</p>
        </header>

        <div class="glass-panel p-6 rounded-xl mb-8 border-t-4 border-t-amber-600 shadow-2xl">
            <form id="radar-form" class="grid grid-cols-1 md:grid-cols-5 gap-4 items-end">
                <div>
                    <label class="block mb-1 text-[10px] text-slate-400 uppercase font-bold">İçerik</label>
                    <input type="text" id="in_isim" list="obj-list" placeholder="8.4 Hide" required class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white text-sm outline-none">
                </div>
                <div>
                    <label class="block mb-1 text-[10px] text-slate-400 uppercase font-bold">Harita</label>
                    <input type="text" id="in_harita" list="comprehensive-maps" oninput="autoDetect()" placeholder="Harita adı..." required class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white text-sm outline-none">
                </div>
                <div>
                    <label class="block mb-1 text-[10px] text-amber-500 uppercase font-bold">Uzaklık (Nodes)</label>
                    <input type="number" id="in_mesafe" placeholder="Map" min="1" class="w-full bg-slate-900 border border-amber-600/50 rounded p-2 text-white text-sm font-bold outline-none">
                </div>
                <div>
                    <label class="block mb-1 text-[10px] text-slate-400 uppercase font-bold">Dakika</label>
                    <input type="number" id="in_dakika" placeholder="45" required class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white text-sm outline-none">
                </div>
                <button type="submit" id="btn_submit" class="bg-amber-600 hover:bg-amber-500 text-white font-bold py-2 rounded h-[38px] text-sm uppercase transition-all shadow-lg">İşle</button>
            </form>
        </div>

        <div class="glass-panel p-4 rounded-xl shadow-lg">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="border-b border-slate-700 text-slate-500 text-[10px] uppercase font-bold">
                            <th class="p-3">İçerik</th><th class="p-3">Harita</th><th class="p-3 text-amber-500">Mesafe</th><th class="p-3">Kalan</th><th class="p-3 text-right">İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="list-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <datalist id="obj-list">
        <option value="4.4 Hide"></option><option value="8.4 Hide"></option><option value="Purple Core"></option><option value="Legendary Vortex"></option>
    </datalist>
    <datalist id="comprehensive-maps">
        <option value="Windgrass Gully"></option><option value="Windgrass Rill"></option><option value="Swiftwater Basin"></option>
        </datalist>

    <script>
        const S_URL = 'https://wbrpssjxzfxiyhwibked.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndicnBzc2p4emZ4aXlod2lia2VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTA1NTAsImV4cCI6MjA5MDk2NjU1MH0.-ZOimu7lyVwG5OLyJvooCiZqvuqz523QkWHZyGV8ztA';
        const sb = supabase.createClient(S_URL, S_KEY);
        const TABLE = 'albion_content_tracker_deneme';

        async function load() {
            try {
                const { data, error } = await sb.from(TABLE).select('*');
                if (error) throw error;
                
                // KRİTİK GÜNCELLEME: Sadece süresi bitmemiş olanları filtrele
                const now = new Date();
                const activeItems = data.filter(i => new Date(i.bitis_zamani) > now);
                
                // Süresi bitenleri veritabanından da temizlemek istersen buraya otomatik delete eklenebilir.
                // Şimdilik sadece listeden gizliyoruz.
                
                items = activeItems.sort((a, b) => new Date(a.bitis_zamani) - new Date(b.bitis_zamani));
                render();
            } catch (e) { console.error(e); }
        }

        // Diğer render, del ve submit fonksiyonları V5.5 ile aynı...
        // Sadece render kısmında "Sil" butonunun her zaman aktif olmasını sağladım.

        function render() {
            const body = document.getElementById('list-body');
            body.innerHTML = '';
            items.forEach(i => {
                const left = (new Date(i.bitis_zamani) - new Date()) / 60000;
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-800/50 priority-row bg-amber-900/5";
                tr.innerHTML = `
                    <td class="p-3 font-bold text-white">${i.isim}</td>
                    <td class="p-3 text-slate-400">${i.harita}</td>
                    <td class="p-3 text-amber-500 text-[10px] font-bold italic">📍 Manuel/Auto</td>
                    <td class="p-3 font-mono text-amber-500">${Math.floor(left)}dk kaldı</td>
                    <td class="p-3 text-right">
                        <button onclick="del(${i.id})" class="text-red-500 text-[10px] font-bold hover:underline bg-red-500/10 px-2 py-1 rounded">KESİN SİL</button>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        async function del(id) {
            // Silme işlemini onaysız ve direkt yapacak şekilde hızlandırdım
            const { error } = await sb.from(TABLE).delete().eq('id', id);
            if (!error) load();
        }

        document.getElementById('radar-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                isim: document.getElementById('in_isim').value,
                harita: document.getElementById('in_harita').value,
                bitis_zamani: new Date(Date.now() + document.getElementById('in_dakika').value * 60000).toISOString()
            };
            await sb.from(TABLE).insert([payload]);
            e.target.reset();
            load();
        });

        setInterval(load, 15000); // 15 saniyede bir otomatik temizlik yapar
        load();
    </script>
</body>
</html>
