<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALBION RADAR V4.8 | Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f172a; color: #cbd5e1; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid #334155; }
        .impossible-row { opacity: 0.3; grayscale: 1; pointer-events: none; }
        .priority-row { border-left: 4px solid #f59e0b; }
        .dev-banner { background-color: #0369a1; color: white; text-align: center; font-size: 0.75rem; padding: 0.25rem; font-weight: bold; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    </style>
</head>
<body class="font-sans">

    <div class="dev-banner">🚀 V4.8: MARTLOCK PORTAL - AKILLI NAVİGASYON (GÜNCEL)</div>

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-amber-500 mb-2">⚔️ Albion Objective Tracker</h1>
            <p class="text-sm text-slate-400">Rota Analiz ve Zamanlama Sistemi</p>
        </header>

        <div id="route-suggestion" class="mb-6 bg-blue-900/20 border border-blue-500/50 p-4 rounded-xl hidden">
            <h3 class="text-blue-400 font-bold text-sm mb-3">📍 Önerilen Operasyon Rotası</h3>
            <div id="route-list" class="flex flex-wrap items-center gap-2"></div>
        </div>

        <div class="glass-panel p-6 rounded-xl mb-8 border-t-4 border-t-blue-500 shadow-xl">
            <form id="add-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block mb-1 text-xs text-slate-400">Tür (Örn: 8.4 Hide)</label>
                    <input type="text" id="isim_input" list="obj_list" required class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block mb-1 text-xs text-slate-400">Harita (Map)</label>
                    <input type="text" id="harita_input" list="map_list" required class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block mb-1 text-xs text-slate-400">Kalan Dakika</label>
                    <input type="number" id="dakika_input" required class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white outline-none focus:border-amber-500">
                </div>
                <button type="submit" id="submit_btn" class="bg-amber-600 hover:bg-amber-500 text-white font-bold py-2 rounded h-[42px] transition-all">SİSTEME İŞLE</button>
            </form>
        </div>

        <div class="glass-panel p-6 rounded-xl shadow-lg">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-slate-700 text-slate-400 text-xs uppercase">
                            <th class="p-3">İçerik</th>
                            <th class="p-3">Harita</th>
                            <th class="p-3">Mesafe (Durak)</th>
                            <th class="p-3">Zamanlama</th>
                            <th class="p-3 text-right">İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="targets-body">
                        <tr><td colspan="5" class="text-center p-8 text-slate-500">Veriler yükleniyor...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <datalist id="obj_list">
        <option value="4.4 Hide"></option><option value="8.4 Hide"></option><option value="Purple Core"></option><option value="Legendary Vortex"></option>
    </datalist>
    <datalist id="map_list">
        <option value="Sandmount Ascent"></option><option value="Gravemound Cliffs"></option><option value="Highstone Loch"></option>
    </datalist>

    <script>
        // SUPABASE AYARLARI
        const SUPABASE_URL = 'https://wbrpssjxzfxiyhwibked.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndicnBzc2p4emZ4aXlod2lia2VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTA1NTAsImV4cCI6MjA5MDk2NjU1MH0.-ZOimu7lyVwG5OLyJvooCiZqvuqz523QkWHZyGV8ztA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const TABLO_ADI = 'albion_content_tracker_deneme';

        // ROTA VERİLERİ (Durak Sayısı)
        const MAP_NODES = {
            "Grave of Eternity": 1, "Mudfoot Sump": 1, "Windgrass Border": 1,
            "Cathedral of Light": 2, "Windgrass Fields": 2, "Frostbite Mountain": 2,
            "Gravemound Brim": 3, "Highstone Grassland": 3, "Westweald Thicket": 3,
            "Gravemound Cliffs": 4, "Gravemound Hills": 4, "Highstone Plateau": 4, "Westweald Shore": 4,
            "Highstone Loch": 5, "Sandmount Strand": 5,
            "Sandmount Ascent": 6, "Avalanche Incline": 7
        };

        let targets = [];

        async function fetchTargets() {
            try {
                const { data, error } = await supabaseClient.from(TABLO_ADI).select('*');
                if (error) throw error;
                targets = data.sort((a, b) => new Date(a.bitis_zamani) - new Date(b.bitis_zamani));
                render();
            } catch (err) { console.error("Hata:", err); }
        }

        function render() {
            const tbody = document.getElementById('targets-body');
            tbody.innerHTML = '';
            
            targets.forEach(t => {
                const nodes = MAP_NODES[t.harita] || 3;
                const travelTime = nodes * 2.1;
                const timeLeft = (new Date(t.bitis_zamani) - new Date()) / 60000;
                const impossible = timeLeft < travelTime;

                const tr = document.createElement('tr');
                tr.className = `border-b border-slate-700/50 ${impossible ? 'impossible-row' : 'priority-row'}`;
                
                tr.innerHTML = `
                    <td class="p-3 font-bold text-white">${t.isim}</td>
                    <td class="p-3 text-slate-300 text-sm">${t.harita}</td>
                    <td class="p-3 text-blue-400 text-xs font-bold">📍 ${nodes} Durak (~${travelTime.toFixed(0)} dk)</td>
                    <td class="p-3 font-mono text-amber-500">${timeLeft > 0 ? Math.floor(timeLeft) + 'dk kaldı' : 'BİTTİ'}</td>
                    <td class="p-3 text-right">
                        <button onclick="deleteTarget(${t.id})" class="text-red-400 hover:text-red-200 text-xs">Sil</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            updateRoute();
        }

        function updateRoute() {
            const box = document.getElementById('route-suggestion');
            const viable = targets.filter(t => (new Date(t.bitis_zamani) - new Date()) / 60000 >= (MAP_NODES[t.harita] || 3) * 2.1);
            if(viable.length > 0) {
                box.classList.remove('hidden');
                document.getElementById('route-list').innerHTML = viable.slice(0, 3).map((t, i) => `
                    <div class="bg-slate-800 p-2 rounded border border-blue-500/30 text-[11px]">
                        <b class="text-white">${i+1}. ${t.harita}</b> (${t.isim})
                    </div>
                `).join('<span class="text-slate-600">➜</span>');
            } else { box.classList.add('hidden'); }
        }

        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit_btn');
            btn.innerText = "Ekleniyor..."; btn.disabled = true;

            const isim = document.getElementById('isim_input').value;
            const harita = document.getElementById('harita_input').value;
            const dakika = parseInt(document.getElementById('dakika_input').value);

            try {
                const bitis = new Date(Date.now() + dakika * 60000).toISOString();
                
                // Supabase Sütun İsimleriyle %100 Eşleşme
                const { error } = await supabaseClient.from(TABLO_ADI).insert([{ 
                    isim: isim, 
                    harita: harita, 
                    bitis_zamani: bitis 
                }]);

                if (error) throw error;
                e.target.reset();
                await fetchTargets();
            } catch (err) {
                alert("Hata: " + err.message);
            } finally {
                btn.innerText = "SİSTEME İŞLE"; btn.disabled = false;
            }
        });

        async function deleteTarget(id) {
            if(confirm("Silinsin mi?")) {
                await supabaseClient.from(TABLO_ADI).delete().eq('id', id);
                fetchTargets();
            }
        }

        setInterval(fetchTargets, 30000);
        fetchTargets();
    </script>
</body>
</html>
