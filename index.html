<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALBION RADAR | Smart Navigation V4.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f172a; color: #cbd5e1; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid #334155; }
        input[type="file"]::file-selector-button {
            background-color: #334155; color: white; border: none; padding: 0.5rem 1rem;
            border-radius: 0.25rem; cursor: pointer; margin-right: 1rem; transition: background-color 0.2s;
        }
        input[type="file"]::file-selector-button:hover { background-color: #475569; }
        .dev-banner { background-color: #0369a1; color: white; text-align: center; font-size: 0.75rem; padding: 0.25rem; font-weight: bold; letter-spacing: 1px;}
        .impossible-row { opacity: 0.3; grayscale: 1; filter: blur(0.5px); pointer-events: none; }
        .priority-row { border-left: 4px solid #f59e0b; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    </style>
</head>
<body class="font-sans">

    <div class="dev-banner">🚀 V4.6: HATASIZ NAVİGASYON SİSTEMİ AKTİF</div>

    <input type="file" id="hidden-image-input" accept="image/*" class="hidden" onchange="handleImageUpdate(event)">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-amber-500 mb-2">⚔️ Albion Objective Tracker</h1>
            <p class="text-sm text-slate-400 font-medium">Martlock Portal Taktiksel Analiz Ekranı</p>
        </header>

        <div id="route-suggestion" class="mb-6 bg-blue-900/20 border border-blue-500/50 p-4 rounded-xl hidden">
            <h3 class="text-blue-400 font-bold flex items-center gap-2 mb-3 text-sm">📍 Stratejik Harekat Rotası / Suggested Route</h3>
            <div id="route-list" class="flex flex-wrap items-center gap-2"></div>
        </div>

        <div class="glass-panel p-6 rounded-xl mb-8 shadow-lg border-t-4 border-t-blue-500">
            <form id="add-form" class="grid grid-cols-1 md:grid-cols-5 gap-4 items-end">
                <div>
                    <label class="block mb-1 text-xs text-slate-300">Tür (Objective)</label>
                    <input type="text" id="isim" list="objektif-listesi" placeholder="8.4 Hide..." required autocomplete="off" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white focus:border-amber-500 outline-none">
                </div>
                <div>
                    <label class="block mb-1 text-xs text-slate-300">Harita (Map)</label>
                    <input type="text" id="harita" list="harita-listesi" placeholder="Harita adı..." required autocomplete="off" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white focus:border-amber-500 outline-none">
                </div>
                <div>
                    <label class="block mb-1 text-xs text-slate-300">Kalan Dakika</label>
                    <input type="number" id="dakika" placeholder="45" required min="1" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white focus:border-amber-500 outline-none">
                </div>
                <div>
                    <label class="block mb-1 text-xs text-slate-300">Görsel (İsteğe Bağlı)</label>
                    <input type="file" id="resim" accept="image/*" class="w-full text-sm text-slate-400 file:py-1 file:px-2 file:bg-slate-700 file:text-white file:border-0 cursor-pointer">
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-2 rounded transition-colors h-[42px] flex items-center justify-center">
                    SİSTEME İŞLE
                </button>
            </form>
        </div>

        <div class="glass-panel p-6 rounded-xl shadow-lg">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-700 text-slate-300 text-sm">
                            <th class="p-3">Görsel</th>
                            <th class="p-3">İçerik</th>
                            <th class="p-3">Harita</th>
                            <th class="p-3">Mesafe (Nodes)</th>
                            <th class="p-3">Zamanlama</th>
                            <th class="p-3 text-right">İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="targets-body">
                        <tr><td colspan="6" class="text-center p-8 text-slate-500">Kayıtlar yükleniyor...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <datalist id="objektif-listesi">
        <option value="4.4 Hide"></option><option value="5.4 Hide"></option><option value="6.4 Hide"></option><option value="7.4 Hide"></option><option value="8.4 Hide"></option>
        <option value="4.4 Wood"></option><option value="5.4 Wood"></option><option value="6.4 Wood"></option><option value="7.4 Wood"></option><option value="8.4 Wood"></option>
        <option value="4.4 Ore"></option><option value="5.4 Ore"></option><option value="6.4 Ore"></option><option value="7.4 Ore"></option><option value="8.4 Ore"></option>
        <option value="4.4 Fiber"></option><option value="5.4 Fiber"></option><option value="6.4 Fiber"></option><option value="7.4 Fiber"></option><option value="8.4 Fiber"></option>
        <option value="Green Core"></option><option value="Blue Core"></option><option value="Purple Core"></option><option value="Legendary Core"></option>
    </datalist>

    <datalist id="harita-listesi">
        <option value="Sandmount Ascent"></option><option value="Sandmount Strand"></option><option value="Westweald Shore"></option>
        <option value="Gravemound Cliffs"></option><option value="Gravemound Hills"></option><option value="Gravemound Brim"></option>
        <option value="Highstone Loch"></option><option value="Highstone Plateau"></option><option value="Highstone Meadow"></option>
        <option value="Avalanche Incline"></option><option value="Mudfoot Sump"></option><option value="Windgrass Border"></option>
    </datalist>

    <script>
        const SUPABASE_URL = 'https://wbrpssjxzfxiyhwibked.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndicnBzc2p4emZ4aXlod2lia2VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTA1NTAsImV4cCI6MjA5MDk2NjU1MH0.-ZOimu7lyVwG5OLyJvooCiZqvuqz523QkWHZyGV8ztA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const TABLO_ADI = 'albion_content_tracker_deneme';
        const BUCKET_ADI = 'hedef-resimleri';

        const MAP_NODES = {
            "Grave of Eternity": 1, "Mudfoot Sump": 1, "Windgrass Border": 1,
            "Cathedral of Light": 2, "Windgrass Fields": 2, "Bleachskull Steppe": 2, "Frostbite Mountain": 2,
            "Gravemound Brim": 3, "Highstone Grassland": 3, "Bleachskull Desert": 3, "Westweald Thicket": 3,
            "Gravemound Cliffs": 4, "Gravemound Hills": 4, "Greenhollow Vale": 4, "Highstone Plateau": 4, "Westweald Shore": 4,
            "Highstone Loch": 5, "Highstone Meadow": 5, "Sandmount Strand": 5,
            "Razorrock Verge": 6, "Sandmount Ascent": 6,
            "Avalanche Incline": 7
        };

        let targets = [];
        let currentUpdateId = null;

        async function fetchTargets() {
            try {
                const { data, error } = await supabaseClient.from(TABLO_ADI).select('*');
                if (error) throw error;
                targets = data.sort((a, b) => new Date(a.bitis_zamani) - new Date(b.bitis_zamani));
                renderTargets();
                updateRouteUI();
            } catch (err) { console.error("Veri çekme hatası:", err); }
        }

        function formatTimeLeft(endTimeStr) {
            const diff = new Date(endTimeStr).getTime() - new Date().getTime();
            if (diff < 0) return `<span class="text-red-500 font-bold">SÜRE DOLDU</span>`;
            const m = Math.floor(diff / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            return `<span class="text-amber-400 font-mono font-bold">${m}dk ${s}sn</span>`;
        }

        function renderTargets() {
            const tbody = document.getElementById('targets-body');
            tbody.innerHTML = '';
            if (targets.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center p-4 text-slate-500 italic">Henüz aktif hedef yok.</td></tr>';
                return;
            }
            targets.forEach(target => {
                const nodes = MAP_NODES[target.harita] || 3;
                const travelTime = nodes * 2.1;
                const timeLeft = (new Date(target.bitis_zamani) - new Date()) / 60000;
                const isImpossible = timeLeft < travelTime;

                const tr = document.createElement('tr');
                tr.className = `border-b border-slate-700/50 hover:bg-slate-800/50 transition-colors ${isImpossible ? 'impossible-row' : 'priority-row'}`;
                
                const resimHtml = target.resim_url 
                    ? `<a href="${target.resim_url}" target="_blank"><img src="${target.resim_url}" class="w-10 h-10 object-cover rounded border border-slate-600"></a>`
                    : `<div class="w-10 h-10 flex items-center justify-center bg-slate-800 rounded text-[8px] text-slate-500 italic">No Pic</div>`;

                tr.innerHTML = `
                    <td class="p-3">${resimHtml}</td>
                    <td class="p-3 font-semibold text-white">${target.isim}</td>
                    <td class="p-3 text-slate-300 text-sm">${target.harita}</td>
                    <td class="p-3"><span class="text-blue-400 text-xs font-bold">📍 ${nodes} Durak (~${travelTime.toFixed(0)} dk)</span></td>
                    <td class="p-3" id="timer-${target.id}">${formatTimeLeft(target.bitis_zamani)}</td>
                    <td class="p-3 text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick="triggerImageUpdate(${target.id})" class="p-2 bg-blue-900/40 text-blue-400 rounded hover:bg-blue-600 text-xs transition-all">📷</button>
                            <button onclick="deleteTarget(${target.id})" class="p-2 bg-red-900/40 text-red-400 rounded hover:bg-red-600 text-xs transition-all">Sil</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateRouteUI() {
            const box = document.getElementById('route-suggestion');
            const list = document.getElementById('route-list');
            const viable = targets.filter(t => (new Date(t.bitis_zamani) - new Date()) / 60000 >= (MAP_NODES[t.harita] || 3) * 2.1);
            if(viable.length > 0) {
                box.classList.remove('hidden');
                list.innerHTML = viable.slice(0, 3).map((t, i) => `
                    <div class="bg-slate-800 p-2 rounded-lg border border-blue-500/30 text-[11px] flex items-center gap-2">
                        <span class="bg-blue-600 text-white w-4 h-4 flex items-center justify-center rounded-full text-[9px] font-bold">${i+1}</span>
                        <div><b class="text-white">${t.harita}</b><br><span class="text-[9px] text-slate-400">${t.isim}</span></div>
                    </div>
                `).join('<span class="text-slate-600">➜</span>');
            } else { box.classList.add('hidden'); }
        }

        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerHTML = 'Ekleniyor...'; btn.disabled = true;

            const isim = document.getElementById('isim').value;
            const harita = document.getElementById('harita').value;
            const dakika = parseInt(document.getElementById('dakika').value);
            const resimDosyasi = document.getElementById('resim').files[0];
            let resimUrl = null;

            try {
                if (resimDosyasi) {
                    const benzersizIsim = `${Date.now()}-${resimDosyasi.name}`;
                    const { error: uploadError } = await supabaseClient.storage.from(BUCKET_ADI).upload(benzersizIsim, resimDosyasi);
                    if (uploadError) throw uploadError;
                    resimUrl = supabaseClient.storage.from(BUCKET_ADI).getPublicUrl(benzersizIsim).data.publicUrl;
                }
                const bitisZamani = new Date(Date.now() + dakika * 60000).toISOString();
                const { error: dbError } = await supabaseClient.from(TABLO_ADI).insert([{ isim, harita, bitis_zamani: bitisZamani, resim_url: resimUrl }]);
                if (dbError) throw dbError;
                
                e.target.reset();
                fetchTargets();
            } catch (err) { 
                console.error("Ekleme hatası:", err);
                alert("Eklenirken bir hata oluştu. Veritabanı sütun isimlerini kontrol edin.");
            } finally {
                btn.innerHTML = 'SİSTEME İŞLE'; btn.disabled = false;
            }
        });

        function triggerImageUpdate(id) { currentUpdateId = id; document.getElementById('hidden-image-input').click(); }
        async function handleImageUpdate(event) {
            const dosya = event.target.files[0];
            if (!dosya || !currentUpdateId) return;
            try {
                const isim = `${Date.now()}-${dosya.name}`;
                await supabaseClient.storage.from(BUCKET_ADI).upload(isim, dosya);
                const url = supabaseClient.storage.from(BUCKET_ADI).getPublicUrl(isim).data.publicUrl;
                await supabaseClient.from(TABLO_ADI).update({ resim_url: url }).eq('id', currentUpdateId);
                fetchTargets();
            } catch (e) { console.error(e); } finally { event.target.value = ''; }
        }
        async function deleteTarget(id) { if(confirm("Bu hedefi silmek istediğine emin misin?")) { await supabaseClient.from(TABLO_ADI).delete().eq('id', id); fetchTargets(); } }

        setInterval(() => {
            targets.forEach(t => {
                const el = document.getElementById(`timer-${t.id}`);
                if(el) el.innerHTML = formatTimeLeft(t.bitis_zamani);
            });
        }, 1000);

        supabaseClient.channel('realtime').on('postgres_changes', { event: '*', schema: 'public', table: TABLO_ADI }, fetchTargets).subscribe();
        fetchTargets();
    </script>
</body>
</html>
