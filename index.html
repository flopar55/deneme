<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALBION RADAR | V6.6 LEGACY CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f172a; color: #cbd5e1; margin: 0; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid #334155; }
        .priority-row { border-left: 4px solid #f59e0b; transition: all 0.2s; }
        .selected-row { background: rgba(59, 130, 246, 0.15) !important; border-left-color: #3b82f6 !important; }
        .route-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #334155; border-top: 3px solid #3b82f6; }
        .dev-banner { background-color: #1e3a8a; color: white; text-align: center; font-size: 0.75rem; padding: 0.25rem; font-weight: bold; }
        input[type="checkbox"] { cursor: pointer; accent-color: #f59e0b; width: 16px; height: 16px; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    </style>
</head>
<body class="font-sans">

    <div class="dev-banner">🚀 V6.6: KOLSAN</div>

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-bold text-amber-500 mb-1 font-serif">⚔️ Albion Objective Tracker</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-[0.3em] font-bold">Tactical Resource & Logistics Center</p>
        </header>

        <div id="route-display" class="mb-8 grid grid-cols-1 md:grid-cols-3 gap-4 hidden">
            <div class="col-span-full border-b border-slate-700 pb-2 mb-2 text-blue-400 text-xs font-bold uppercase tracking-widest">🧭 Önerilen Rota </div>
        </div>

        <div class="glass-panel p-6 rounded-xl mb-6 border-t-4 border-t-amber-600 shadow-2xl">
            <form id="radar-form" class="grid grid-cols-1 md:grid-cols-5 gap-4 items-end">
                <div>
                    <label class="block mb-1 text-[10px] text-slate-400 uppercase font-bold">İçerik (Objective)</label>
                    <input type="text" id="in_isim" list="full-obj-list" placeholder="Objektif seç..." required class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white text-sm outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block mb-1 text-[10px] text-slate-400 uppercase font-bold">Harita (Map)</label>
                    <input type="text" id="in_harita" list="map-list" oninput="autoDetect()" placeholder="Harita seç..." required class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white text-sm outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block mb-1 text-[10px] text-amber-500 uppercase font-bold">Mesafe (Nodes)</label>
                    <input type="number" id="in_mesafe" placeholder="Otomatik/Manuel" min="1" class="w-full bg-slate-900 border border-amber-600/50 rounded p-2 text-white text-sm font-bold outline-none">
                </div>
                <div>
                    <label class="block mb-1 text-[10px] text-slate-400 uppercase font-bold">Dakika Kaldı</label>
                    <input type="number" id="in_dakika" required class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white text-sm outline-none">
                </div>
                <button type="submit" id="btn_submit" class="bg-amber-600 hover:bg-amber-500 text-white font-bold py-2 rounded h-[38px] text-sm uppercase transition-all shadow-lg">Ekle</button>
            </form>
        </div>

        <div id="bulk-controls" class="mb-4 flex items-center justify-between bg-blue-900/30 border border-blue-500/50 p-3 rounded-lg hidden transition-all">
            <div class="text-sm text-blue-300 font-bold">⚡ <span id="selected-count">0</span> hedef seçildi</div>
            <button onclick="bulkDelete()" class="bg-red-600 hover:bg-red-500 text-white text-xs font-bold px-4 py-2 rounded uppercase transition-all shadow-lg">Seçilenleri Sil</button>
        </div>

        <div class="glass-panel p-4 rounded-xl shadow-lg">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm border-separate border-spacing-y-1">
                    <thead>
                        <tr class="text-slate-500 text-[10px] uppercase font-bold border-b border-slate-700">
                            <th class="p-3 w-10 text-center"><input type="checkbox" id="select-all" onclick="toggleAll(this)"></th>
                            <th class="p-3">Objektif</th>
                            <th class="p-3">Harita</th>
                            <th class="p-3 text-amber-500 text-center">Uzaklık</th>
                            <th class="p-3">Zaman</th>
                            <th class="p-3 text-right">İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="list-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <datalist id="full-obj-list">
        <option value="Green Outpost"></option><option value="Blue Outpost"></option><option value="Purple Outpost"></option><option value="Legendary Outpost"></option>
        <option value="Small Chest"></option><option value="Medium Chest"></option><option value="Large Chest"></option>
        <option value="4.4 Hide"></option><option value="5.4 Hide"></option><option value="6.4 Hide"></option><option value="7.4 Hide"></option><option value="8.4 Hide"></option>
        <option value="4.4 Ore"></option><option value="5.4 Ore"></option><option value="6.4 Ore"></option><option value="7.4 Ore"></option><option value="8.4 Ore"></option>
        <option value="4.4 Wood"></option><option value="5.4 Wood"></option><option value="6.4 Wood"></option><option value="7.4 Wood"></option><option value="8.4 Wood"></option>
        <option value="4.4 Fiber"></option><option value="5.4 Fiber"></option><option value="6.4 Fiber"></option><option value="7.4 Fiber"></option><option value="8.4 Fiber"></option>
        <option value="Green Core"></option><option value="Blue Core"></option><option value="Purple Core"></option><option value="Legendary Core"></option>
        <option value="Green Vortex"></option><option value="Blue Vortex"></option><option value="Purple Vortex"></option><option value="Legendary Vortex"></option>
    </datalist>

    <datalist id="map-list">
        <option value="Mudfoot Sump"></option><option value="Windgrass Border"></option><option value="Windgrass Precipice"></option><option value="Windgrass Gully"></option><option value="Windgrass Rill"></option>
        <option value="Windgrass Fields"></option><option value="Cathedral of Light"></option><option value="Bleachskull Steppe"></option><option value="Windgrass Coast"></option><option value="Frostbite Mountain"></option>
        <option value="Gravemound Brim"></option><option value="Highstone Grassland"></option><option value="Bleachskull Desert"></option><option value="Sandmount Desert"></option><option value="Frostbite Chasm"></option>
        <option value="Gravemound Cliffs"></option><option value="Highstone Plateau"></option><option value="Sandmount Esker"></option><option value="Westweald Shore"></option>
        <option value="Sandmount Strand"></option><option value="Sandmount Ascent"></option><option value="Avalanche Incline"></option>
    </datalist>

    <script>
        const S_URL = 'https://wbrpssjxzfxiyhwibked.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndicnBzc2p4emZ4aXlod2lia2VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTA1NTAsImV4cCI6MjA5MDk2NjU1MH0.-ZOimu7lyVwG5OLyJvooCiZqvuqz523QkWHZyGV8ztA';
        const sb = supabase.createClient(S_URL, S_KEY);
        const TABLE = 'albion_content_tracker_deneme';

        const MAP_GRAPH = {
            "Mudfoot Sump": 1, "Windgrass Border": 1, "Windgrass Precipice": 1, "Windgrass Gully": 1, "Windgrass Rill": 1,
            "Windgrass Fields": 2, "Cathedral of Light": 2, "Bleachskull Steppe": 2, "Windgrass Coast": 2, "Frostbite Mountain": 2,
            "Gravemound Brim": 3, "Highstone Grassland": 3, "Bleachskull Desert": 3, "Sandmount Desert": 3, "Frostbite Chasm": 3,
            "Gravemound Cliffs": 4, "Highstone Plateau": 4, "Sandmount Esker": 4, "Westweald Shore": 4,
            "Sandmount Strand": 5, "Sandmount Ascent": 6, "Avalanche Incline": 7
        };

        let items = [];
        let selectedIds = new Set();

        function autoDetect() {
            const map = document.getElementById('in_harita').value;
            if (MAP_GRAPH[map]) document.getElementById('in_mesafe').value = MAP_GRAPH[map];
        }

        async function load() {
            const { data } = await sb.from(TABLE).select('*');
            items = data ? data.sort((a, b) => new Date(a.bitis_zamani) - new Date(b.bitis_zamani)) : [];
            render();
            updateNavigation();
        }

        function render() {
            const body = document.getElementById('list-body');
            body.innerHTML = '';
            items.forEach(i => {
                const node = MAP_GRAPH[i.harita] || 3;
                const left = (new Date(i.bitis_zamani) - new Date()) / 60000;
                const isSelected = selectedIds.has(i.id);
                
                const tr = document.createElement('tr');
                tr.className = `priority-row bg-slate-800/40 border-b border-slate-700/50 ${isSelected ? 'selected-row' : ''}`;
                tr.innerHTML = `
                    <td class="p-3 text-center"><input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelect(${i.id}, this)"></td>
                    <td class="p-3 font-bold text-white uppercase text-xs">${i.isim}</td>
                    <td class="p-3 text-xs text-slate-300">${i.harita}</td>
                    <td class="p-3 text-amber-500 text-center text-[10px] font-bold italic">📍 ${node} Map</td>
                    <td class="p-3 font-mono text-amber-500 text-xs">${left > 0 ? Math.floor(left) + 'dk' : 'BİTTİ'}</td>
                    <td class="p-3 text-right"><button onclick="del(${i.id})" class="text-red-500/40 hover:text-red-500 text-[10px] font-bold uppercase transition-all">Sil</button></td>
                `;
                body.appendChild(tr);
            });
            updateBulkUI();
        }

        function toggleSelect(id, el) {
            el.checked ? selectedIds.add(id) : selectedIds.delete(id);
            render();
        }

        function toggleAll(el) {
            selectedIds.clear();
            if (el.checked) items.forEach(i => selectedIds.add(i.id));
            render();
        }

        function updateBulkUI() {
            const ctrl = document.getElementById('bulk-controls');
            ctrl.classList.toggle('hidden', selectedIds.size === 0);
            document.getElementById('selected-count').innerText = selectedIds.size;
        }

        async function bulkDelete() {
            if (!confirm(`${selectedIds.size} hedef silinsin mi?`)) return;
            await sb.from(TABLE).delete().in('id', Array.from(selectedIds));
            selectedIds.clear(); load();
        }

        function updateNavigation() {
            const display = document.getElementById('route-display');
            display.innerHTML = '<div class="col-span-full border-b border-slate-700 pb-2 mb-2 text-blue-400 text-xs font-bold uppercase tracking-widest">🧭 Önerilen Rota </div>';
            
            const recommendations = items.filter(i => {
                const nodeCount = MAP_GRAPH[i.harita] || 3;
                const timeLeft = (new Date(i.bitis_zamani) - new Date()) / 60000;
                return timeLeft > (nodeCount * 2.1);
            }).slice(0, 3);

            if (recommendations.length > 0) {
                display.classList.remove('hidden');
                recommendations.forEach((rec, idx) => {
                    const card = document.createElement('div');
                    card.className = "route-card p-4 rounded-xl shadow-2xl";
                    card.innerHTML = `
                        <div class="text-[9px] text-blue-500 font-bold mb-1 uppercase">HEDEF #${idx+1}</div>
                        <div class="text-white font-bold text-sm mb-1 leading-tight">${rec.harita}</div>
                        <div class="text-amber-500 text-xs font-bold uppercase">${rec.isim}</div>
                        <div class="mt-3 text-[10px] text-slate-500 italic">Yol: ~${(MAP_GRAPH[rec.harita] || 3) * 2}dk</div>
                    `;
                    display.appendChild(card);
                });
            } else { display.classList.add('hidden'); }
        }

        document.getElementById('radar-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn_submit');
            btn.innerText = "..."; btn.disabled = true;

            const map = document.getElementById('in_harita').value;
            const dist = parseInt(document.getElementById('in_mesafe').value);
            if(dist) MAP_GRAPH[map] = dist;

            const payload = {
                isim: document.getElementById('in_isim').value,
                harita: map,
                bitis_zamani: new Date(Date.now() + document.getElementById('in_dakika').value * 60000).toISOString()
            };

            await sb.from(TABLE).insert([payload]);
            e.target.reset(); load();
            btn.innerText = "Ekle"; btn.disabled = false;
        });

        async function del(id) { await sb.from(TABLE).delete().eq('id', id); selectedIds.delete(id); load(); }
        setInterval(load, 30000);
        load();
    </script>
</body>
</html>
